<main class="photo-grid-page">
  <section class="gallery-intro">
    <div class="container">
      <p class="gallery-eyebrow">Selected Work</p>
      <h2 class="gallery-title">
        Photographs gathered across places, formats, and seasons.
      </h2>
      <p class="gallery-copy">
        These images were made on a mix of digital and analog cameras and film
        stocks while traveling through cities, coastlines, and quiet corners
        around the world. Stay awhile.
      </p>
    </div>
  </section>

  <section class="gallery-grid">
    <div class="container">
      <div id="macy-container">
        <app-photo
          *ngFor="
            let photo of visiblePhotos;
            let index = index;
            trackBy: trackByPhotoId
          "
          [routerLink]="['/lightbox', photo.id]"
          [photoAlt]="photo.photoAlt"
          [photoSrc]="photo.photoSrc"
          [photoTitle]="photo.photoTitle"
          [loading]="index < 3 ? 'eager' : 'lazy'"
          [fetchPriority]="index < 3 ? 'high' : 'auto'"
          (imageLoaded)="onPhotoLoaded()"
        ></app-photo>
      </div>

      <div *ngIf="hasMorePhotos" #loadTrigger class="load-trigger">
        <button
          type="button"
          class="load-more-button"
          (click)="loadMorePhotos()"
        >
          Continue Exploring
        </button>
      </div>
    </div>
  </section>
</main>
