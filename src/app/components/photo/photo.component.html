<div class="app-photo-wrapper" [class.has-title]="!!photoTitle">
  <img
    [src]="photoSrc"
    [alt]="photoAlt"
    [attr.title]="photoTitle || null"
    [loading]="loading"
    [attr.fetchpriority]="fetchPriority"
    (load)="onImageLoad()"
    decoding="async"
    class="photo"
  >
  <span *ngIf="photoTitle" class="photo-title">{{ photoTitle }}</span>
</div>
